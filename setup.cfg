[pycodestyle]
# 120 cols: a couple of nft kill-switch rule strings are inherently long.
max-line-length = 120
# E402: PyGObject requires gi.require_version() before importing from
#       gi.repository, so some imports must follow code.
# E702: a few intentional "a; b" compact lines for paired style toggles.
# W503/W504: mutually exclusive line-break-around-operator rules; pick neither.
ignore = E402, E702, W503, W504
